<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acerte o Filme pela Cena</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="quizfilme.css">
</head>
<body>
  <div class="game-container">
    <h1>Acerte o Filme pela Cena 🎥</h1>
    <div id="gameBox">
      </div>

    <div class="footer-link">
      <a href="../paginalogin/Site.html">← Voltar à Página Inicial</a>
    </div>
    
    
  </div>

  <div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-primary" id="resultModalLabel">Resultado Final</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body" id="resultText" style="font-weight:600; font-size:1.2rem;"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" onclick="recomecarJogo()" data-bs-dismiss="modal">Recomeçar Jogo</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="quizfilme.js"></script>


</body>
</html>
